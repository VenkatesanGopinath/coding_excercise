# ── Production datasource ─────────────────────────────────────────────────────
# Credentials come from environment variables; no secrets in source control.
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
%prod.quarkus.datasource.jdbc.max-size=8
%prod.quarkus.datasource.jdbc.min-size=2

# Production: validate schema only — never drop-and-create in prod.
%prod.quarkus.hibernate-orm.database.generation=validate

# Production: SQL logging disabled to avoid sensitive data exposure.
%prod.quarkus.hibernate-orm.log.sql=false

# ── Dev-mode datasource ────────────────────────────────────────────────────────
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=quarkus_test
%dev.quarkus.datasource.password=quarkus_test
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/quarkus_test

# ── Test datasource ────────────────────────────────────────────────────────────
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.username=quarkus_test
%test.quarkus.datasource.password=quarkus_test
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/quarkus_test

# ── Hibernate ORM (dev + test) ─────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# ── OpenAPI generator ──────────────────────────────────────────────────────────
quarkus.openapi.generator.spec=warehouse-openapi.yaml
quarkus.openapi.generator.base-package=com.warehouse.api

# ── Security: Basic Auth ───────────────────────────────────────────────────────
quarkus.http.auth.basic=true
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true

# Production admin credentials (password comes from environment variable).
%prod.quarkus.security.users.embedded.users.admin=${WAREHOUSE_ADMIN_PASSWORD}
%prod.quarkus.security.users.embedded.roles.admin=warehouse-admin

# Dev admin: fixed credential for local development only.
%dev.quarkus.security.users.embedded.users.admin=admin
%dev.quarkus.security.users.embedded.roles.admin=warehouse-admin

# Test: @TestSecurity on @QuarkusTest classes bypasses actual auth.
# Configure a real embedded user only for @QuarkusIntegrationTest (native profile).
%test.quarkus.security.users.embedded.users.testuser=testpass
%test.quarkus.security.users.embedded.roles.testuser=warehouse-admin

# ── JaCoCo ────────────────────────────────────────────────────────────────────
%test.quarkus.jacoco.data-file=target/jacoco.exec
%test.quarkus.jacoco.reuse-data-file=true
